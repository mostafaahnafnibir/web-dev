<!DOCTYPE html>
<html>
    <head>
      <title>Media in HTML</title>
    </head>
    <body>
        <h2>Adding an image</h2>
        <img src="Cat.jpg" alt="A Cat">

        <h2>Adding a song</h2>

        <audio controls>
            <source src="juniorsoundays-short-10-228139 (1).mp3
            " type="audio/mpeg">
        </audio>
        <h2>Adding a video</h2>
                <video controls width="300px">
                    <source src="vid_medium.mp4" type="video/mp4">
                </video>
                <h2>Adding a Youtube Video</h2>
                <iframe width="560" height="315" src="https://www.youtube.com/embed/NSAOrGb9orM?si=mzOMTSCCcv0bK-S8"
                    title="YouTube video player" frameborder="0"
                    allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture; web-share"
                    referrerpolicy="strict-origin-when-cross-origin" allowfullscreen></iframe>
    </body>
</html>
